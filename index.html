<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Was This Made by A.I.?</title>

  <style>
    /* ------------------------------------------------------------------
       FONTS — loaded from the local "fonts/" folder.
       When deploying, keep the "fonts/" folder next to this HTML file.
    -------------------------------------------------------------------*/

    @font-face {
      font-family: "ET Sans";
      src: url("fonts/ETSans-Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "ET Text";
      src: url("fonts/ETText-Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "ET Text";
      src: url("fonts/ETText-Medium.otf") format("opentype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "ET Text";
      src: url("fonts/ETText-Bold.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --font-et-sans: "ET Sans", "Helvetica Neue", Arial, sans-serif;
      --font-et-text: "ET Text", Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-et-text);
      font-weight: 400; /* ET Text Regular */
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 20px 0px;
    }

    /* Progress indicator → ET Sans Regular */
    .progress-text {
      font-family: var(--font-et-sans);
      font-weight: 400;
      font-size: 14px;
      color: #666;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    /* Question title → ET Text Medium */
    h1.question-title {
      font-family: var(--font-et-text);
      font-weight: 500; /* Medium */
      font-size: 26px;
      line-height: 1.25;
      margin: 0 0 22px;
      color: #111;
      letter-spacing: -0.005em;
    }

    /* Quiz image */
    .quiz-image {
      width: 100%;
      display: block;
      border-radius: 4px;
      background: #f3f3f3;
      max-height: 480px;
      object-fit: cover;
    }

    /* Buttons row (horizontal) */
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    /* Choice button label → ET Text Regular */
    .choice-btn {
      position: relative;
      padding: 16px 38px 16px 18px;
      border-radius: 4px;
      border: 1px solid #d4d4d4;
      background: #f3f3f3;
      color: #111;
      font-family: var(--font-et-text);
      font-weight: 400; /* Regular */
      font-size: 17px;
      cursor: pointer;
      text-align: left;
      transition: background .15s ease, border-color .15s ease;
    }

    .choice-btn:hover:not(:disabled) { background: #e8e8e8; }
    .choice-btn:disabled { cursor: default; }

    .choice-btn.selected {
      background: #d4d4d4;
      border-color: #b0b0b0;
    }

    /* Green check shown only on the correct answer after reveal */
    .choice-btn .check {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      font-weight: 900;
      color: #1a7f37;
      display: none;
      line-height: 1;
      font-family: Arial, sans-serif;
    }

    .choice-btn.is-correct .check { display: inline; }

    /* Reveal text */
    .reveal {
      display: none;
      margin-top: 22px;
      font-family: var(--font-et-text);
      font-weight: 400; /* ET Text Regular */
      font-size: 17px;
      line-height: 1.5;
      color: #222;
    }

    .reveal.show { display: block; }

    /* "You're right!" / "Oops, not quite." → ET Text Bold */
    .reveal .verdict {
      font-family: var(--font-et-text);
      font-weight: 700; /* Bold */
      color: #111;
    }

    /* Next button row */
    .next-row {
      display: none;
      margin-top: 22px;
      justify-content: flex-end;
    }

    .next-row.show { display: flex; }

    /* Next / Restart button → ET Sans Regular */
    .next-btn, .restart-btn {
      background: #111;
      color: #fff;
      border: 0;
      padding: 11px 22px;
      border-radius: 4px;
      font-family: var(--font-et-sans);
      font-weight: 400;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .next-btn:hover, .restart-btn:hover { background: #333; }

    /* Results card — simple centered layout */
    .result-card { display: none; text-align: center; }
    .result-card.show { display: block; }

    /* "Here are your results" → ET Text Bold, centered */
    .result-card h2 {
      font-family: var(--font-et-text);
      font-weight: 700;
      font-size: 22px;
      line-height: 1.3;
      margin: 0 0 12px;
      color: #111;
    }

    /* "You got X out of 10 questions correct." → ET Text Regular */
    .result-card p {
      font-family: var(--font-et-text);
      font-weight: 400;
      font-size: 17px;
      line-height: 1.5;
      color: #333;
      margin: 0 0 24px;
    }

    .result-card .restart-btn { margin-top: 4px; }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      .wrap { padding: 16px 16px 0px; }
      h1.question-title { font-size: 21px; }
      .choice-btn {
        padding: 14px 32px 14px 14px;
        font-size: 15px;
      }
      .choice-btn .check { font-size: 18px; right: 12px; }
      .reveal { font-size: 16px; }
      .result-card h2 { font-size: 19px; }
      .result-card p { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <!-- Quiz Card -->
    <section id="quizCard">
      <div class="progress-text" id="progressText">1 of 10</div>

      <h1 class="question-title" id="questionTitle">Was this made by A.I.?</h1>

      <img class="quiz-image" id="quizImage" src="" alt="Quiz image" />

      <div class="button-row">
        <button class="choice-btn" id="btnAI" onclick="answer('AI')">
          <span class="label">A.I.</span>
          <span class="check">&#10003;</span>
        </button>
        <button class="choice-btn" id="btnReal" onclick="answer('REAL')">
          <span class="label">Not A.I.</span>
          <span class="check">&#10003;</span>
        </button>
      </div>

      <div class="reveal" id="revealBox">
        <span class="verdict" id="revealTitle"></span><span id="revealText"></span>
      </div>

      <div class="next-row" id="nextRow">
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next</button>
      </div>
    </section>

    <!-- Result Card -->
    <section class="result-card" id="resultCard">
      <h2>Here are your results</h2>
      <p id="resultText"></p>
      <button class="restart-btn" onclick="restartQuiz()">Restart</button>
    </section>
  </main>

  <script>
    /*
     * Edit the array below to change questions.
     *   image       – path to the image (place files in an "images/" folder next to this HTML)
     *   answer      – "AI" or "REAL"
     *   description – the part AFTER "This is " / "But this is ".
     *                 e.g. "an AI-generated photo. (Credit)"
     *                 The script auto-prepends "You're right! This is " when
     *                 the user is correct, or "Nice try! But this is " when wrong.
     */
    const quizData = [
      {
        image: "images/1.jpg",
        answer: "AI",
        description: "an AI-generated photo. (Chris Hayes/Public Domain)"
      },
      {
        image: "images/2.jpg",
        answer: "REAL",
        description: "a real photo of a Indonesian diver from the Nature Conservancy dressed in a Santa Claus outfit examines an artificial coral reef in Nusa Penida on the Bali island on Dec. 4, 2009. (Sonny Tumbelaka/AFP via Getty Images)"
      },
      {
        image: "images/3.jpg",
        answer: "REAL",
        description: "a real photo of a larval form of the Spicebush Swallowtail. (John Flannery/CC BY-SA 2.0)"
      },
      {
        image: "images/4.jpg",
        answer: "AI",
        description: "an AI-generated photo. (Mike Goad/Public Domain)"
      },
      {
        image: "images/5.jpg",
        answer: "AI",
        description: "an AI-generated photo. (Lindell Dillon/Public Domain)"
      },
      {
        image: "images/6.jpg",
        answer: "REAL",
        description: "a real photo of spot-billed pelicans on the banks of an artificial lake in Colombo, Sri Lanka, on Sept. 28, 2021. (Ishara S. Kodikara/AFP via Getty Images)"
      },
      {
        image: "images/7.jpg",
        answer: "REAL",
        description: "a real photo of then-FIFA president Sepp Blatter looks on with fake dollars note flying around him thrown by a protester during a press conference at the football's world body headquarter's in Zurich on July 20, 2015. (Fabrice Coffrini/AFP via Getty Images)"
      },
      {
        image: "images/8.jpg",
        answer: "AI",
        description: "an AI-generated photo. (Dennis Sylvester Hurd/Public Domain)"
      },
      {
        image: "images/9.jpg",
        answer: "REAL",
        description: "a real photo of a fashion model wearing matching red wool sheath dress and jacket with bow fastening, long cream-coloured suede gloves, and cheetah fur hat, in the United States in 1996. (FPG/Archive Photos/Getty Images)"
      },
      {
        image: "images/10.jpg",
        answer: "AI",
        description: "an AI-generated photo. (Ron Cogswell/CC BY 2.0)"
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const quizImage      = document.getElementById('quizImage');
    const progressText   = document.getElementById('progressText');
    const revealBox      = document.getElementById('revealBox');
    const revealTitle    = document.getElementById('revealTitle');
    const revealText     = document.getElementById('revealText');
    const nextRow        = document.getElementById('nextRow');
    const nextBtn        = document.getElementById('nextBtn');
    const btnAI          = document.getElementById('btnAI');
    const btnReal        = document.getElementById('btnReal');

    function loadQuestion() {
      answered = false;
      const q = quizData[current];
      quizImage.src = q.image;
      progressText.textContent = `${current + 1} of ${quizData.length}`;

      revealBox.classList.remove('show');
      nextRow.classList.remove('show');

      btnAI.disabled = false;
      btnReal.disabled = false;
      btnAI.classList.remove('selected', 'is-correct');
      btnReal.classList.remove('selected', 'is-correct');

      // On the last question the "next" button becomes "See Results".
      nextBtn.textContent = (current === quizData.length - 1) ? 'See Results' : 'Next';
    }

    function answer(choice) {
      if (answered) return;
      answered = true;

      const q = quizData[current];
      const correct = (choice === q.answer);
      if (correct) score++;

      const selectedButton = (choice === 'AI') ? btnAI : btnReal;
      const correctButton  = (q.answer === 'AI') ? btnAI : btnReal;

      selectedButton.classList.add('selected');
      correctButton.classList.add('is-correct');

      btnAI.disabled = true;
      btnReal.disabled = true;

      revealTitle.textContent = correct ? "You're right! " : "Nice try! ";
      revealText.textContent  = (correct ? "This is " : "But this is ") + q.description;
      revealBox.classList.add('show');
      nextRow.classList.add('show');
    }

    function nextQuestion() {
      if (current < quizData.length - 1) {
        current++;
        loadQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('resultCard').classList.add('show');
      document.getElementById('resultText').textContent =
        `You got ${score} out of ${quizData.length} questions correct.`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('quizCard').style.display = 'block';
      loadQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadQuestion();
  </script>
</body>
</html>
